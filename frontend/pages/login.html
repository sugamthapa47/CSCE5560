<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SecureShop</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Secure<span>Shop</span></h2>
      <p>Login to your account</p>
    </div>
    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password"/>
    </div>
    <a href="/pages/forgot-password.html" class="forgot-link">Forgot password?</a>
    <button class="btn-primary" id="btn-login" onclick="handleLogin()">Login →</button>
    <div class="auth-divider"><span>or</span></div>
    <p class="auth-link">Don't have an account? <a href="/pages/register.html">Create one</a></p>
  </div>
</div>
<script src="/js/cart.js"></script>
<script src="/js/api.js"></script>
<script>
  if (isLoggedIn()) window.location.href = "/";
  async function handleLogin() {
    hideAlert("alert-error");
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("btn-login");
    if (!email || !password) return showAlert("alert-error", "Email and password are required.");
    btn.disabled = true;
    btn.textContent = "Verifying…";
    const data = await apiLogin(email, password);
    if (data.error) {
      showAlert("alert-error", data.error);
      btn.disabled = false;
      btn.textContent = "Login →";
    } else {
      showAlert("alert-success", "OTP sent to your email! Redirecting…");
      setTimeout(() => navigateTo("/pages/otp.html"), 1200);
    }
  }
  document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
</script>
</body>
</html>
