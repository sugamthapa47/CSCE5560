<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — SecureShop</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .steps { display:flex; gap:0; margin-bottom:32px; }
    .step {
      flex:1; text-align:center; position:relative;
      padding-bottom:20px;
    }
    .step::after {
      content:''; position:absolute;
      top:14px; left:50%; width:100%;
      height:2px; background:var(--border);
      z-index:0;
    }
    .step:last-child::after { display:none; }
    .step-dot {
      width:28px; height:28px; border-radius:50%;
      background:var(--bg-3); border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:.72rem; font-weight:800; color:var(--text-3);
      margin:0 auto 8px; position:relative; z-index:1;
      transition:all .3s;
    }
    .step.active .step-dot {
      background:var(--accent); border-color:var(--accent);
      color:white; box-shadow:0 0 0 4px rgba(233,69,96,.15);
    }
    .step.done .step-dot {
      background:var(--success); border-color:var(--success); color:white;
    }
    .step.done::after { background:var(--success); }
    .step.active::after { background:linear-gradient(90deg,var(--accent),var(--border)); }
    .step-label { font-size:.68rem; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.4px; }
    .step.active .step-label { color:var(--accent); }
    .step.done .step-label { color:var(--success); }

    .panel { display:none; animation:fadeUp .35s var(--ease) both; }
    .panel.active { display:block; }

    .resend-btn {
      background:none; border:none; cursor:pointer;
      color:var(--accent); font-weight:600; font-size:.875rem;
      font-family:inherit; padding:0; transition:opacity .2s;
    }
    .resend-btn:disabled { opacity:.4; cursor:not-allowed; }
    .resend-btn:hover:not(:disabled) { opacity:.75; }

    .success-icon {
      width:72px; height:72px; border-radius:50%;
      background:#f0fdf4; border:2px solid #bbf7d0;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; margin:0 auto 20px;
      animation:scaleIn .4s var(--spring);
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <h2>Secure<span>Shop</span></h2>
      <p>Reset your password</p>
    </div>

    <!-- Steps indicator -->
    <div class="steps" id="steps">
      <div class="step active" id="step-1">
        <div class="step-dot">1</div>
        <div class="step-label">Email</div>
      </div>
      <div class="step" id="step-2">
        <div class="step-dot">2</div>
        <div class="step-label">Verify</div>
      </div>
      <div class="step" id="step-3">
        <div class="step-dot">3</div>
        <div class="step-label">Done</div>
      </div>
    </div>

    <!-- Panel 1: Enter email -->
    <div class="panel active" id="panel-1">
      <div class="alert alert-error" id="err-1"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="fp-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <button class="btn-primary" id="btn-send" onclick="sendReset()">
        Send Reset Code →
      </button>
      <p class="auth-link" style="margin-top:18px;">
        Remembered it? <a href="/pages/login.html">Sign in</a>
      </p>
    </div>

    <!-- Panel 2: Enter OTP + new password -->
    <div class="panel" id="panel-2">
      <div class="alert alert-info" id="info-2" style="display:block;">
        📬 We sent a 6-digit code to your email. Enter it below.
      </div>
      <div class="alert alert-error" id="err-2"></div>
      <div class="form-group">
        <label>6-Digit Code</label>
        <input class="otp-input" type="text" id="fp-otp" maxlength="6"
          placeholder="000000" inputmode="numeric"
          oninput="this.value=this.value.replace(/\D/g,'')"/>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="fp-pass" placeholder="Min 8 chars, uppercase, number, symbol"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="fp-confirm" placeholder="Re-enter new password"/>
      </div>
      <button class="btn-primary" id="btn-verify" onclick="verifyReset()">
        Reset Password →
      </button>
      <p style="text-align:center;margin-top:14px;font-size:.8rem;color:var(--text-3);">
        Didn't receive it?
        <button class="resend-btn" id="resend-btn" onclick="resendCode()">Resend code</button>
        <span id="resend-timer" style="display:none;color:var(--text-3);"></span>
      </p>
    </div>

    <!-- Panel 3: Success -->
    <div class="panel" id="panel-3">
      <div style="text-align:center;padding:8px 0;">
        <div class="success-icon">✅</div>
        <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:8px;">Password Reset!</h3>
        <p style="color:var(--text-3);font-size:.9rem;margin-bottom:28px;line-height:1.6;">
          Your password has been updated successfully.<br/>You can now sign in with your new password.
        </p>
        <a href="/pages/login.html" class="btn-primary" style="display:inline-block;text-decoration:none;padding:14px 40px;border-radius:999px;max-width:240px;">
          Sign In Now →
        </a>
      </div>
    </div>

  </div>
</div>

<script src="/js/cart.js"></script>
<script src="/js/api.js"></script>
<script>
  let userEmail = "";
  let resendInterval = null;

  function goStep(n) {
    [1,2,3].forEach(i => {
      const s = document.getElementById(`step-${i}`);
      const p = document.getElementById(`panel-${i}`);
      s.className = "step" + (i < n ? " done" : i === n ? " active" : "");
      p.className = "panel" + (i === n ? " active" : "");
    });
  }

  async function sendReset() {
    const email = document.getElementById("fp-email").value.trim();
    const btn   = document.getElementById("btn-send");
    const err   = document.getElementById("err-1");
    err.style.display = "none";

    if (!email) {
      err.textContent = "Please enter your email address.";
      err.style.display = "block"; return;
    }

    btn.disabled = true;
    btn.textContent = "Sending…";

    try {
      // Call your backend — adjust this endpoint to match your actual reset endpoint
      // For now we simulate since you may not have this route yet
      const res  = await fetch("/api/auth/forgot-password", {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (data.error) {
        err.textContent = data.error;
        err.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Send Reset Code →";
        return;
      }

      userEmail = email;
      goStep(2);
      startResendTimer();

    } catch(e) {
      err.textContent = "Something went wrong. Please try again.";
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Send Reset Code →";
    }
  }

  async function verifyReset() {
    const otp     = document.getElementById("fp-otp").value.trim();
    const pass    = document.getElementById("fp-pass").value;
    const confirm = document.getElementById("fp-confirm").value;
    const btn     = document.getElementById("btn-verify");
    const err     = document.getElementById("err-2");
    err.style.display = "none";

    if (!otp || otp.length < 6) { err.textContent = "Enter the 6-digit code."; err.style.display = "block"; return; }
    if (!pass) { err.textContent = "Enter a new password."; err.style.display = "block"; return; }
    if (pass !== confirm) { err.textContent = "Passwords don't match."; err.style.display = "block"; return; }

    const pwReg = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/;
    if (!pwReg.test(pass)) {
      err.textContent = "Password must be 8+ chars with uppercase, number, and symbol.";
      err.style.display = "block"; return;
    }

    btn.disabled = true;
    btn.textContent = "Verifying…";

    try {
      const res  = await fetch("/api/auth/reset-password", {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail, otp, newPassword: pass })
      });
      const data = await res.json();

      if (data.error) {
        err.textContent = data.error;
        err.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Reset Password →";
        return;
      }

      if (resendInterval) clearInterval(resendInterval);
      goStep(3);

    } catch(e) {
      err.textContent = "Something went wrong. Please try again.";
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Reset Password →";
    }
  }

  async function resendCode() {
    const btn = document.getElementById("resend-btn");
    btn.disabled = true;
    try {
      await fetch("/api/auth/forgot-password", {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail })
      });
      const info = document.getElementById("info-2");
      info.textContent = "📬 Code resent! Check your email.";
      info.style.display = "block";
      startResendTimer();
    } catch(e) {
      btn.disabled = false;
    }
  }

  function startResendTimer() {
    let secs = 60;
    const btn   = document.getElementById("resend-btn");
    const timer = document.getElementById("resend-timer");
    btn.style.display   = "none";
    timer.style.display = "inline";
    if (resendInterval) clearInterval(resendInterval);
    timer.textContent = `Resend in ${secs}s`;
    resendInterval = setInterval(() => {
      secs--;
      timer.textContent = `Resend in ${secs}s`;
      if (secs <= 0) {
        clearInterval(resendInterval);
        timer.style.display = "none";
        btn.style.display   = "inline";
        btn.disabled        = false;
      }
    }, 1000);
  }

  // Enter key support
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const p1 = document.getElementById("panel-1");
    const p2 = document.getElementById("panel-2");
    if (p1.classList.contains("active")) sendReset();
    if (p2.classList.contains("active")) verifyReset();
  });
</script>
</body>
</html>
