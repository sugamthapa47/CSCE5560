<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — SecureShop</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: white; border-radius: 24px;
      max-width: 680px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,.35);
      transform: scale(0.94);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-header {
      padding: 20px 24px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
      border-bottom: 1px solid #f0f0f0;
      position: sticky; top: 0; background: white; z-index: 10;
      border-radius: 24px 24px 0 0;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-header p  { font-size: .78rem; color: #a3a3a3; margin-top: 2px; }
    .modal-close {
      background: #f5f5f5; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: .9rem; display: flex; align-items: center;
      justify-content: center; transition: all .2s; flex-shrink: 0;
    }
    .modal-close:hover { background: #e94560; color: white; }
    .modal-body { padding: 20px 24px 28px; }
    .gallery-main-img {
      width: 100%; aspect-ratio: 16/9;
      border-radius: 16px; overflow: hidden;
      background: #f5f5f5; margin-bottom: 12px;
    }
    .gallery-main-img img  { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-main-img iframe,
    .gallery-main-img video { width: 100%; height: 100%; border: none; border-radius: 16px; }
    .gallery-thumbs {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 6px; margin-bottom: 20px; scrollbar-width: thin;
    }
    .gallery-thumb {
      flex-shrink: 0; width: 72px; height: 72px;
      border-radius: 12px; overflow: hidden;
      border: 2.5px solid transparent;
      cursor: pointer; transition: all .2s;
      background: #f5f5f5; position: relative;
    }
    .gallery-thumb.active { border-color: #e94560; }
    .gallery-thumb:hover  { border-color: #0a0a0a; transform: scale(1.05); }
    .gallery-thumb img    { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb .play-icon {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .product-detail-info { border-top: 1px solid #f5f5f5; padding-top: 20px; }
    .product-detail-info .cat-tag {
      font-size: .7rem; font-weight: 700; color: #a3a3a3;
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px;
    }
    .product-detail-info h2 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.5px; margin-bottom: 10px; }
    .product-detail-info .desc-text { font-size: .875rem; color: #525252; line-height: 1.65; margin-bottom: 20px; }
    .price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .big-price  { font-size: 1.9rem; font-weight: 800; letter-spacing: -1px; }
    .modal-add-btn {
      width: 100%; background: #0a0a0a; color: white;
      border: none; padding: 15px; border-radius: 999px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: all .2s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      position: relative; overflow: hidden;
    }
    .modal-add-btn:hover { background: #e94560; }
    .modal-add-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }
    .toast-container {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column;
      align-items: center; gap: 10px; pointer-events: none;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateY(16px) scale(.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(16px); } }
    .toast {
      background: #0a0a0a; color: white; padding: 11px 22px;
      border-radius: 999px; font-size: .875rem; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      animation: toastIn .3s ease both; pointer-events: all;
    }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }
    .toast.hiding  { animation: toastOut .3s ease forwards; }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }
    .ripple-effect {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.35);
      transform: scale(0); animation: ripple .5s linear;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <div>
          <h2 class="section-title">All Products</h2>
          <p class="section-subtitle">Click any product to see full gallery & details</p>
        </div>
        <span id="product-count" style="font-size:.875rem;color:#a3a3a3;font-weight:500;"></span>
      </div>

      <div class="filter-bar reveal">
        <input type="text" id="search" placeholder="🔍  Search products…" oninput="filterProducts()"/>
        <select id="category" onchange="filterProducts()">
          <option value="">All Categories</option>
          <option value="Smartphones">📱 Smartphones</option>
          <option value="Laptops">💻 Laptops</option>
          <option value="Headphones">🎧 Headphones</option>
          <option value="Smartwatches">⌚ Smartwatches</option>
          <option value="Tablets">📟 Tablets</option>
        </select>
        <select id="sort" onchange="filterProducts()">
          <option value="">Sort By</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>

      <div class="product-grid" id="product-grid">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2025 <span>SecureShop</span> — All rights reserved</p>
  </footer>

  <!-- Product Detail Modal -->
  <div class="modal-overlay" id="product-modal" onclick="handleModalClick(event)">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <div>
          <h3 id="modal-title">Product</h3>
          <p id="modal-category"></p>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="gallery-main-img" id="gallery-main">
          <img id="gallery-main-img" src="" alt="Product"/>
        </div>
        <div class="gallery-thumbs" id="gallery-thumbs"></div>
        <div class="product-detail-info">
          <div class="price-row">
            <span class="big-price" id="modal-price"></span>
            <span id="modal-stock-badge" class="stock-badge"></span>
          </div>
          <p class="desc-text" id="modal-desc"></p>
          <button class="modal-add-btn" id="modal-add-btn" onclick="modalAddToCart()">
            🛒 Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script>
    let allProducts = [];
    let currentProduct = null;

    renderNavbar();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); }});
    }, { threshold: 0.08 });
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

    window.addEventListener("scroll", () => {
      document.querySelector(".navbar")?.classList.toggle("scrolled", window.scrollY > 20);
    });

    function showToast(msg, type = "") {
      const c = document.getElementById("toast-container");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.classList.add("hiding"); setTimeout(() => t.remove(), 300); }, 2500);
    }

    document.addEventListener("click", e => {
      const btn = e.target.closest(".btn-add, .modal-add-btn");
      if (!btn || btn.disabled) return;
      const r = document.createElement("span");
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.className = "ripple-effect";
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
      btn.appendChild(r);
      setTimeout(() => r.remove(), 500);
    });

    async function loadProducts() {
      try {
        const res = await fetch("/api/products");
        allProducts = await res.json();
        renderGrid(allProducts);
      } catch {
        document.getElementById("product-grid").innerHTML =
          "<p style='color:red;grid-column:1/-1'>Failed to load products.</p>";
      }
    }

    function filterProducts() {
      const search   = document.getElementById("search").value.toLowerCase();
      const category = document.getElementById("category").value;
      const sort     = document.getElementById("sort").value;
      let filtered = allProducts.filter(p => {
        const ms = p.name.toLowerCase().includes(search) || (p.description||"").toLowerCase().includes(search);
        const mc = !category || p.category === category;
        return ms && mc;
      });
      if (sort === "price-asc")  filtered.sort((a,b) => a.price - b.price);
      if (sort === "price-desc") filtered.sort((a,b) => b.price - a.price);
      if (sort === "name")       filtered.sort((a,b) => a.name.localeCompare(b.name));
      renderGrid(filtered);
    }

    function renderGrid(products) {
      const grid = document.getElementById("product-grid");
      document.getElementById("product-count").textContent = `${products.length} product${products.length !== 1 ? "s" : ""}`;
      if (!products.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>No products found.</p></div>`;
        return;
      }
      grid.innerHTML = products.map((p, i) => `
        <div class="product-card reveal" style="animation-delay:${(i % 8) * 0.06}s" onclick="openProduct(${p.id})">
          <div class="product-card-img">
            <img src="${p.image_url || "https://placehold.co/400x300?text=No+Image"}" alt="${p.name}" loading="lazy"/>
            ${p.stock <= 5 && p.stock > 0 ? `<span class="card-badge low">Only ${p.stock} left</span>` : ""}
            ${p.stock === 0 ? `<span class="card-badge">Out of Stock</span>` : ""}
          </div>
          <div class="card-body">
            <span class="category">${p.category || "General"}</span>
            <h3>${p.name}</h3>
            <p class="desc">${p.description ? p.description.slice(0,80)+"…" : ""}</p>
            <div class="card-footer">
              <span class="price">$${parseFloat(p.price).toFixed(2)}</span>
              <span class="stock-badge ${p.stock > 5 ? "stock-in" : p.stock > 0 ? "stock-low" : "stock-out"}">
                ${p.stock > 5 ? "● In Stock" : p.stock > 0 ? `● ${p.stock} left` : "● Out"}
              </span>
            </div>
            <button class="btn-add" ${p.stock === 0 ? "disabled" : ""}
              onclick="event.stopPropagation();addToCart({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',price:${p.price},image_url:'${p.image_url||""}'}); showToast('Added to cart ✓','success'); renderNavbar();">
              🛒 Add to Cart
            </button>
          </div>
        </div>`).join("");
      grid.querySelectorAll(".reveal").forEach(el => observer.observe(el));
    }

    async function openProduct(id) {
      currentProduct = allProducts.find(p => p.id === id);
      if (!currentProduct) return;

      let media = [];
      try {
        const res = await fetch(`/api/media/${id}`);
        media = await res.json();
      } catch { media = []; }

      document.getElementById("modal-title").textContent    = currentProduct.name;
      document.getElementById("modal-category").textContent = currentProduct.category;
      document.getElementById("modal-price").textContent    = `$${parseFloat(currentProduct.price).toFixed(2)}`;
      document.getElementById("modal-desc").textContent     = currentProduct.description || "No description available.";

      const sb = document.getElementById("modal-stock-badge");
      if (currentProduct.stock > 5)      { sb.className = "stock-badge stock-in";  sb.textContent = "● In Stock"; }
      else if (currentProduct.stock > 0) { sb.className = "stock-badge stock-low"; sb.textContent = `● Only ${currentProduct.stock} left`; }
      else                               { sb.className = "stock-badge stock-out"; sb.textContent = "● Out of Stock"; }

      document.getElementById("modal-add-btn").disabled = currentProduct.stock === 0;

      // Build full media list
      const allMedia = [];
      if (currentProduct.image_url) allMedia.push({ type: "image", url: currentProduct.image_url });
      media.forEach(m => allMedia.push(m));
      window._modalMedia = allMedia;

      setGalleryMain(allMedia[0] || null);

      const thumbsEl = document.getElementById("gallery-thumbs");
      if (allMedia.length <= 1) {
        thumbsEl.innerHTML = "";
      } else {
        thumbsEl.innerHTML = allMedia.map((m, i) => {
          if (m.type === "video") {
            return `<div class="gallery-thumb ${i===0?"active":""}" onclick="selectThumb(this,${i})">
              <img src="https://placehold.co/72x72/0a0a0a/ffffff?text=▶"/>
              <div class="play-icon">▶️</div>
            </div>`;
          }
          return `<div class="gallery-thumb ${i===0?"active":""}" onclick="selectThumb(this,${i})">
            <img src="${m.url}" onerror="this.src='https://placehold.co/72x72?text=?'"/>
          </div>`;
        }).join("");
      }

      document.getElementById("product-modal").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function setGalleryMain(item) {
      const el = document.getElementById("gallery-main");
      if (!item) { el.innerHTML = `<img src="https://placehold.co/680x380?text=No+Image"/>`; return; }
      if (item.type === "video") {
        if (item.url.includes("youtube.com") || item.url.includes("youtu.be")) {
          el.innerHTML = `<iframe src="${item.url}" allowfullscreen></iframe>`;
        } else {
          el.innerHTML = `<video controls><source src="${item.url}"/>Your browser does not support video.</video>`;
        }
      } else {
        el.innerHTML = `<img src="${item.url}" alt="Product" onerror="this.src='https://placehold.co/680x380?text=?'"/>`;
      }
    }

    function selectThumb(el, index) {
      document.querySelectorAll(".gallery-thumb").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      setGalleryMain(window._modalMedia[index]);
    }

    function modalAddToCart() {
      if (!currentProduct || currentProduct.stock === 0) return;
      addToCart({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, image_url: currentProduct.image_url || "" });
      showToast(`${currentProduct.name} added ✓`, "success");
      renderNavbar();
      closeModal();
    }

    function closeModal() {
      document.getElementById("product-modal").classList.remove("open");
      document.body.style.overflow = "";
      const el = document.getElementById("gallery-main");
      const iframe = el.querySelector("iframe");
      const video  = el.querySelector("video");
      if (iframe) iframe.src = iframe.src;
      if (video)  video.pause();
    }

    function handleModalClick(e) {
      if (e.target === document.getElementById("product-modal")) closeModal();
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    loadProducts();
  </script>
</body>
</html>
